<!doctype html>
<html lang="zh-Hant">
<head>

    html { scroll-behavior: smooth; }
    body.no-scroll { overflow: hidden; }
    body {
      margin: 0;
      background: #eee8dc;
      color: #232323;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;

      margin: 0 auto;

      box-shadow: 0 20px 60px rgba(70, 55, 35, 0.16);

    section { padding: 28px 20px 40px; }
    .page { min-height: 100vh; }
    .hidden { display: none !important; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .hamburger { display: grid; gap: 6px; }
    .hamburger span { display: block; width: 22px; height: 1.5px; background: #232323; }
    .location { font-size: 13px; letter-spacing: .18em; display: flex; align-items: center; gap: 7px; }
    .hero { position: relative; min-height: 420px; }
    .hero-img {
      position: absolute; right: -118px; top: 0;
      width: 390px; height: 330px;
      border-bottom-left-radius: 80px;
      object-fit: cover;
      filter: saturate(.82) sepia(.16);
    }
    .fade-left { position: absolute; left: 122px; top: 0; width: 110px; height: 330px; background: linear-gradient(90deg, #f6f1e8, rgba(246,241,232,.75), transparent); }
    .fade-bottom { position: absolute; right: -118px; top: 305px; width: 390px; height: 80px; background: linear-gradient(180deg, transparent, #f6f1e8); }
    .weather { position: relative; z-index: 2; padding-top: 48px; }
    .temp-row { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
    .temp { font-size: 5.7rem; line-height: .85; font-weight: 200; letter-spacing: -.1em; }
    .weather-icon { font-size: 52px; line-height: 1; }
    .weather-title { font-size: 20px; letter-spacing: .25em; font-weight: 500; margin: 0; }
    .feels { margin: 16px 0 0; font-size: 15px; letter-spacing: .12em; color: #57534c; }
    .stats { margin-top: 40px; width: 176px; display: grid; gap: 15px; color: #4f4a43; font-size: 15px; letter-spacing: .06em; }
    .stat { display: flex; justify-content: space-between; align-items: center; }
    .stat span:first-child { display: inline-flex; align-items: center; gap: 10px; }
    .section-title { margin: 0 0 20px; font-size: 22px; font-weight: 500; letter-spacing: .12em; }
    .mood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .genre-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .choice {
      min-height: 88px;
      border: 1px solid #ded6ca;
      background: #faf7f0;
      border-radius: 13px;
      box-shadow: 0 4px 12px rgba(52,43,31,.08);
      padding: 8px 4px;
      color: #262626;
      transition: .2s;
      cursor: pointer;
      font: inherit;
    }
    .choice.genre { min-height: 82px; }
    .choice.active { border-color: #232323; background: #eee5d8; transform: translateY(-1px); }
    .doodle {
      height: 34px;
      width: 34px;
      margin: 0 auto 6px;
      color: #262626;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .doodle svg {
      width: 34px;
      height: 34px;
    }
    .genre-icon { font-size: 24px; margin-bottom: 9px; }
    .choice-label { font-size: 13px; font-weight: 500; letter-spacing: .05em; }
    .mood-label {
      font-size: 12px;
      letter-spacing: .08em;
      line-height: 1.2;
    }
    .recommend-btn {
      display: block; width: 68%; margin: 34px auto 0;
      border: none; border-radius: 9px;
      background: #1f1f1f; color: white;
      padding: 18px 10px;
      font-size: 16px; letter-spacing: .2em;
      cursor: pointer;
    }
    .result-section { position: relative; min-height: 100vh; padding-bottom: 48px; }
    .result-bg { position: absolute; left: 0; right: 0; bottom: 0; height: 380px; overflow: hidden; }

    .result-content { position: relative; z-index: 2; }
    .caption { color: #5c554c; font-size: 14px; line-height: 1.9; letter-spacing: .08em; margin: 0 0 16px; }
    .songs { display: grid; gap: 12px; }
    .song-card {
      display: grid; grid-template-columns: 64px 1fr; align-items: center; gap: 16px;
      border: 1px solid #ddd4c8;
      background: rgba(251,248,241,.9);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(60,48,34,.12);
      backdrop-filter: blur(6px);
      animation: fadeUp .22s ease both;
    }
    .art { width: 56px; height: 56px; border-radius: 9px; object-fit: cover; background: #ddd4c8; }
    .art-fallback {
      width: 56px;
      height: 56px;
      border-radius: 9px;
      background: linear-gradient(135deg, #ddd4c8, #f7efe2 52%, #b7a58e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6f6257;
      font-size: 22px;
    }
    .back-btn {
      border: 1px solid #d7cabc;
      background: rgba(251,248,241,.85);
      color: #5f554b;
      border-radius: 999px;
      padding: 8px 14px;
      margin-bottom: 18px;
      font: inherit;
      font-size: 13px;
      letter-spacing: .08em;
      cursor: pointer;
    }
    .song-title { margin: 0; font-size: 17px; font-weight: 500; color: #242424; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { margin: 4px 0 0; font-size: 13px; color: #5f5a52; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-meta { margin-top: 7px; color: #8a8176; font-size: 11px; display: flex; gap: 7px; }
    audio { width: 100%; height: 30px; margin-top: 8px; }
    .music-link { display: inline-flex; margin-top: 8px; border: 1px solid #d7cabc; border-radius: 999px; padding: 5px 10px; color: #6f6257; text-decoration: none; font-size: 11px; letter-spacing: .08em; }
    .listen-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .listen-row .music-link { margin-top: 0; }
    .audio-note { margin-top: 5px; font-size: 10px; color: #9a9084; letter-spacing: .04em; }
    .hint { border: 1px solid #ddd4c8; background: rgba(251,248,241,.8); border-radius: 18px; padding: 20px; text-align: center; color: #70685e; font-size: 14px; line-height: 1.8; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

      const seed = comboHash(song.title + song.artist + style.type);
      const safeTitle = song.title.replace(/&/g, "&amp;").replace(/</g, "&lt;").slice(0, 18);
      const safeArtist = song.artist.replace(/&/g, "&amp;").replace(/</g, "&lt;").slice(0, 18);

      const motifs = {
        night: `<circle cx='70' cy='42' r='24' fill='${style.accent}' opacity='.35'/><path d='M18 86 C42 62 70 78 102 52' stroke='${style.fg}' stroke-width='5' fill='none' opacity='.55'/>`,
        lake: `<rect y='66' width='120' height='34' fill='${style.accent}' opacity='.45'/><path d='M8 78 C28 70 42 84 62 76 C82 68 94 82 116 74' stroke='${style.fg}' stroke-width='3' fill='none' opacity='.8'/>`,
        portrait: `<circle cx='62' cy='38' r='18' fill='${style.accent}' opacity='.85'/><path d='M34 102 C42 72 82 72 90 102' fill='${style.fg}' opacity='.85'/>`,
        soft: `<circle cx='38' cy='42' r='30' fill='${style.fg}' opacity='.28'/><circle cx='82' cy='74' r='34' fill='${style.accent}' opacity='.24'/>`,
        rock: `<path d='M20 100 L50 16 L58 62 L86 18 L72 104 Z' fill='${style.accent}' opacity='.55'/><rect x='30' y='78' width='62' height='7' fill='${style.fg}'/>`,
        minimal: `<rect x='26' y='25' width='68' height='68' rx='4' fill='none' stroke='${style.fg}' stroke-width='4'/><circle cx='60' cy='59' r='18' fill='${style.accent}' opacity='.32'/>`,
        doodle: `<circle cx='60' cy='52' r='22' fill='none' stroke='${style.fg}' stroke-width='4'/><circle cx='45' cy='35' r='9' fill='${style.fg}'/><circle cx='75' cy='35' r='9' fill='${style.fg}'/>`,
        water: `<path d='M0 78 C26 62 44 90 70 72 C92 56 104 74 120 62 L120 120 L0 120 Z' fill='${style.accent}' opacity='.62'/><path d='M32 52 C45 38 72 38 85 52 C72 66 45 66 32 52 Z' fill='${style.fg}' opacity='.75'/>`,
        retro: `<circle cx='60' cy='60' r='42' fill='${style.accent}' opacity='.35'/><path d='M22 76 H98' stroke='${style.fg}' stroke-width='5'/><path d='M34 44 H86' stroke='${style.fg}' stroke-width='5'/>`,
        silk: `<rect x='0' y='0' width='48' height='120' fill='${style.accent}' opacity='.9'/><path d='M62 20 C96 28 84 70 110 96' stroke='${style.fg}' stroke-width='10' fill='none' opacity='.75'/>`,
        mist: `<circle cx='62' cy='55' r='36' fill='${style.fg}' opacity='.42'/><path d='M10 92 C38 82 58 96 110 84' stroke='${style.accent}' stroke-width='6' fill='none' opacity='.55'/>`,
        pop: `<path d='M60 18 L72 48 L104 48 L78 66 L88 98 L60 78 L32 98 L42 66 L16 48 L48 48 Z' fill='${style.accent}' opacity='.75'/>`,
        honne: `<rect x='16' y='18' width='88' height='84' fill='${style.bg}' stroke='${style.accent}' stroke-width='5'/><path d='M22 86 C50 46 78 112 104 56' stroke='${style.fg}' stroke-width='6' fill='none'/>`,
        blur: `<rect width='120' height='120' fill='${style.accent}' opacity='.2'/><circle cx='44' cy='45' r='34' fill='${style.fg}' opacity='.18'/><circle cx='82' cy='72' r='42' fill='${style.accent}' opacity='.22'/>`,
        dream: `<path d='M20 78 C38 30 82 30 100 78 C74 62 46 62 20 78 Z' fill='${style.fg}' opacity='.45'/><circle cx='76' cy='38' r='10' fill='${style.accent}'/>`,
        soul: `<circle cx='60' cy='60' r='36' fill='${style.accent}' opacity='.55'/><path d='M44 58 C44 42 76 42 76 58 C76 76 60 82 60 82 C60 82 44 76 44 58 Z' fill='${style.fg}' opacity='.8'/>`,
        editorial: `<rect x='18' y='18' width='84' height='84' fill='none' stroke='${style.fg}' stroke-width='2'/><path d='M32 88 C44 34 76 34 88 88' fill='${style.accent}' opacity='.5'/>`,
        travel: `<path d='M18 82 C38 34 82 34 102 82' fill='none' stroke='${style.fg}' stroke-width='5'/><circle cx='60' cy='82' r='20' fill='${style.accent}' opacity='.45'/>`,
        jazz: `<circle cx='60' cy='55' r='38' fill='${style.accent}' opacity='.36'/><path d='M46 88 C64 78 68 55 66 30' stroke='${style.fg}' stroke-width='7' fill='none'/><circle cx='66' cy='30' r='8' fill='${style.fg}'/>`,
        lofi: `<path d='M18 74 C48 18 72 18 102 74' fill='none' stroke='${style.fg}' stroke-width='4'/><path d='M24 80 C44 68 76 68 96 80' stroke='${style.accent}' stroke-width='8' fill='none'/>`,
        default: `<circle cx='60' cy='60' r='38' fill='${style.accent}' opacity='.36'/><path d='M38 78 C52 56 68 56 82 78' stroke='${style.fg}' stroke-width='5' fill='none'/>`,
      }[style.type] || "";

      const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'>
        <defs>
          <filter id='grain'><feTurbulence baseFrequency='.85' numOctaves='3' seed='${seed}'/><feComponentTransfer><feFuncA type='table' tableValues='0 .14'/></feComponentTransfer></filter>
          <linearGradient id='paper' x1='0' y1='0' x2='1' y2='1'><stop stop-color='${style.bg}'/><stop offset='.7' stop-color='#f6efe4'/><stop offset='1' stop-color='${style.accent}' stop-opacity='.7'/></linearGradient>
        </defs>
        <rect width='120' height='120' rx='14' fill='url(#paper)'/>
        ${motifs}
        <rect x='8' y='8' width='104' height='104' rx='10' fill='none' stroke='${style.fg}' stroke-opacity='.18'/>
        <text x='60' y='101' text-anchor='middle' font-family='system-ui, sans-serif' font-size='9' font-weight='600' fill='${style.fg}' opacity='.78'>${safeTitle}</text>
        <text x='60' y='112' text-anchor='middle' font-family='system-ui, sans-serif' font-size='6.5' fill='${style.fg}' opacity='.5'>${safeArtist}</text>
        <rect width='120' height='120' filter='url(#grain)'/>
      </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }
    function generatedSceneUrl(type, mood, genre, seed) {
      const p = { sunny:["#f8f0df","#4f5636","#8d7a55","#f6d58a"], cloudy:["#f6f1e8","#3f4938","#786f5c","#d5c4b2"], rainy:["#f0ece4","#334038","#5f625b","#c9c1b6"] }[type];
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 1400'><filter id='g'><feTurbulence baseFrequency='.9' numOctaves='4' seed='${seed}'/><feComponentTransfer><feFuncA type='table' tableValues='0 .16'/></feComponentTransfer></filter><rect width='900' height='1400' fill='${p[0]}'/><circle cx='220' cy='180' r='430' fill='${p[3]}' opacity='.35'/><path d='M0 430 C120 330 200 430 310 340 C430 240 520 400 640 310 C760 230 820 360 900 300 L900 680 L0 680 Z' fill='${p[1]}'/><rect y='650' width='900' height='360' fill='${p[2]}'/><path d='M0 990 C160 930 320 980 450 945 C610 905 735 960 900 905 L900 1400 L0 1400 Z' fill='#ead9bd'/><g transform='translate(500 905)'><ellipse cx='0' cy='100' rx='185' ry='28' fill='#8a7659' opacity='.2'/><g transform='translate(-35 0)'><circle r='28' fill='#2b2825'/><path d='M-30 33 C-50 80 -35 127 -8 150 C20 124 30 80 16 34 Z' fill='#8c5f49'/></g><g transform='translate(55 -16)'><circle r='31' fill='#4b3728'/><path d='M-24 38 C-42 91 -18 139 23 154 C57 118 64 71 31 34 Z' fill='#2d3551'/></g></g><text x='86' y='795' transform='rotate(90 86 795)' font-family='monospace' font-size='34' fill='#d86f2e' opacity='.72'>22 06 25</text><text x='64' y='1320' font-family='system-ui' font-size='28' fill='#7d6e5e' opacity='.35'>${mood} · ${genre}</text><rect width='900' height='1400' filter='url(#g)' opacity='.42'/></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }
    function renderScene() { const src = generatedSceneUrl(weatherType, selectedMood, selectedGenre, imageSeed); heroImage.src = src; resultImage.src = src; }
    function renderChoices() {
      moodGrid.innerHTML = moods.map(m => `<button class='choice ${m === selectedMood ? "active" : ""}' data-mood='${m}'><div class='doodle'>${moodSvg(m)}</div><div class='mood-label'>${m}</div></button>`).join("");
      genreGrid.innerHTML = genres.map(g => `<button class='choice genre ${g === selectedGenre ? "active" : ""}' data-genre='${g}'><div class='genre-icon'>${genreEmoji(g)}</div><div class='choice-label'>${g}</div></button>`).join("");
      document.querySelectorAll('[data-mood]').forEach(b => b.onclick = () => { selectedMood = b.dataset.mood; renderChoices(); renderScene(); });
      document.querySelectorAll('[data-genre]').forEach(b => b.onclick = () => { selectedGenre = b.dataset.genre; renderChoices(); renderScene(); });
    }
    function genreEmoji(g) { return ({"All":"♫","Indie / 文青":"♬","Lo-fi / Chill":"☊","華語流行":"▣","英文流行":"☆","R&B 靈魂":"♡","嘻哈":"♙","搖滾":"ϟ","Jazz":"♩","夜晚感":"☾","Emo":"☔","Acoustic / 民謠":"♭"})[g] || "♫"; }
    function moodSvg(m) { const map={平靜:"M24 25 L24 50 M14 36 L34 36 M24 50 L16 68 M24 50 L32 68",放鬆:"M25 28 C18 38 16 47 24 54 M24 40 C14 42 12 50 20 54 M28 38 C38 39 42 45 39 52",開心:"M24 26 L24 51 M13 34 L24 24 L35 34 M24 51 L15 68 M24 51 L33 68",難過:"M25 28 C17 39 17 54 28 60 M22 42 C15 47 14 55 19 61",疲憊:"M24 27 C21 39 22 50 26 60 M20 43 L14 58 M28 43 L34 58",無感:"M24 28 L24 53 M16 40 L32 40 M24 53 L18 68 M24 53 L31 68",暴躁:"M24 27 L24 51 M13 40 L23 32 M25 32 L37 39 M24 51 L14 68 M24 51 L35 68",焦慮:"M24 27 C18 36 17 48 24 56 M18 39 L11 52 M29 38 L37 48"}; return `<svg viewBox='0 0 48 78' preserveAspectRatio='xMidYMid meet' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><circle cx='24' cy='24' r='7'/><path d='${map[m]}'/></svg>`; }
    function getRecommendations() {
      const mapped = genreAliases[selectedGenre] || [selectedGenre];
      const languageFilter = selectedGenre === "英文流行" ? "EN" : selectedGenre === "華語流行" ? "中文" : null;
      const comboKey = `${selectedGenre}-${selectedMood}-${weatherType}`;
      const previousSongs = recommendationHistory.get(comboKey) || [];
      const hash = comboHash(`${comboKey}-${Date.now() % 100000}`);

      const ranked = songLibrary
        .filter(song => {
          if (languageFilter && song.lang !== languageFilter) return false;
          return true;
        })
        .map((song, index) => {
          const inferredGenres = getSongGenres(song);
          let score = 0;

          if (selectedGenre === "All") score += 1;
          if (mapped.some(g => inferredGenres.includes(g))) score += 14;
          if (song.moods.includes(selectedMood)) score += 8;
          if (song.weather.includes(weatherType)) score += 4;

          if (previousSongs.includes(song.title)) score -= 18;

          score += ((hash + index * 91) % 1000) / 100;

          return {
            ...song,
            inferredGenres,
            score,
          };
        })
        .filter(song => {
          if (selectedGenre === "All") return true;
          return mapped.some(g => song.inferredGenres.includes(g));
        })
        .sort((a, b) => b.score - a.score);

      const picked = [];
      const artists = new Set();

      for (const song of ranked) {
        if (picked.length >= 3) break;
        if (artists.has(song.artist)) continue;

        picked.push(song);
        artists.add(song.artist);
      }

      recommendationHistory.set(comboKey, picked.map(song => song.title));

      return picked;
    }
    async function fetchMeta(song) {
      const queries = [
        `${song.title} ${song.artist}`,
        song.title,
        song.artist
      ];
      const countries = ['TW', 'US'];

      for (const country of countries) {
        for (const query of queries) {
          try {
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=8&country=${country}`;
            const res = await fetch(url);
            const data = await res.json();
            const results = data.results || [];
            if (!results.length) continue;

            const lowerTitle = song.title.toLowerCase();
            const lowerArtist = song.artist.toLowerCase();
            const best =
              results.find(item => item.previewUrl && item.trackName?.toLowerCase().includes(lowerTitle)) ||
              results.find(item => item.previewUrl && lowerArtist.includes((item.artistName || '').toLowerCase().split(' ')[0])) ||
              results.find(item => item.previewUrl) ||
              results[0];

            return {
              art: best.artworkUrl100?.replace('100x100bb','300x300bb'),
              preview: best.previewUrl,
              link: best.trackViewUrl
            };
          } catch {}
        }
      }
      return {};
    }
    function stopAllAudio() {
      document.querySelectorAll('audio').forEach(audio => {
        audio.pause();
        audio.currentTime = 0;
      });
    }

    function bindExclusiveAudioPlayback() {
      document.querySelectorAll('audio').forEach(audio => {
        audio.addEventListener('play', () => {
          document.querySelectorAll('audio').forEach(otherAudio => {
            if (otherAudio !== audio) {
              otherAudio.pause();
              otherAudio.currentTime = 0;
            }
          });
        });
      });
    }

    async function renderRecommendations() {
      stopAllAudio();
      imageSeed += comboHash(`${selectedGenre}-${selectedMood}-${weatherType}`) % 53 + 7;
      renderScene();
      const songs = getRecommendations();
      homePage.classList.add('hidden');
      resultSection.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'auto' });
      resultArea.className = 'songs';
      resultArea.innerHTML = `<p class='caption'>${moodCaptions[selectedMood]}</p><div class='hint'>正在整理推薦歌曲...</div>`;
      resultArea.innerHTML = `<p class='caption'>${moodCaptions[selectedMood]}</p>`;
      for (const [i, song] of songs.entries()) {
        const meta = await fetchMeta(song);
        const div = document.createElement('article');
        div.className = 'song-card';
        div.style.animationDelay = `${i*.02}s`;

        const img = document.createElement('img');
        img.className = 'art';
        img.alt = `${song.title} generated album-style cover`;
        img.src = generatedAlbumCover(song);
        div.appendChild(img);

        const info = document.createElement('div');
        const title = document.createElement('p');
        title.className = 'song-title';
        title.textContent = song.title;
        const artist = document.createElement('p');
        artist.className = 'song-artist';
        artist.textContent = song.artist;
        const metaLine = document.createElement('div');
        metaLine.className = 'song-meta';
        metaLine.innerHTML = `<span>${song.lang}</span><span>·</span><span>${song.duration}</span>`;

        info.appendChild(title);
        info.appendChild(artist);
        info.appendChild(metaLine);

        const listenRow = document.createElement('div');
        listenRow.className = 'listen-row';

        if (meta.preview) {
          const audio = document.createElement('audio');
          audio.controls = true;
          audio.preload = 'none';
          audio.playsInline = true;
          audio.crossOrigin = 'anonymous';
          audio.src = meta.preview;
          audio.addEventListener('loadeddata', () => {
            audio.style.display = 'block';
          });

          audio.addEventListener('error', () => {
            audio.remove();
            const note = document.createElement('div');
            note.className = 'audio-note';
            note.textContent = '此歌曲試聽檔暫時無法播放，請用下方連結開啟。';
            info.appendChild(note);
          });
          info.appendChild(audio);
        } else {
          const note = document.createElement('div');
          note.className = 'audio-note';
          note.textContent = '這首歌沒有可嵌入的試聽檔。';
          info.appendChild(note);
        }

        const appleLink = document.createElement('a');
        appleLink.className = 'music-link';
        appleLink.href = meta.link || musicSearchUrl(song);
        appleLink.target = '_blank';
        appleLink.rel = 'noreferrer';
        appleLink.textContent = 'Apple Music';
        listenRow.appendChild(appleLink);

        const youtubeLink = document.createElement('a');
        youtubeLink.className = 'music-link';
        youtubeLink.href = youtubeSearchUrl(song);
        youtubeLink.target = '_blank';
        youtubeLink.rel = 'noreferrer';
        youtubeLink.textContent = 'YouTube 試聽';
        listenRow.appendChild(youtubeLink);

        info.appendChild(listenRow);

        div.appendChild(info);
        resultArea.appendChild(div);
      }
      bindExclusiveAudioPlayback();
    }
    async function fetchWeather() {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${WENSHAN.latitude}&longitude=${WENSHAN.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&timezone=Asia%2FTaipei`);
        const data = await res.json(); const w = data.current;
        weatherType = classifyWeather(w.weather_code); temp.textContent = Math.round(w.temperature_2m) + '°'; weatherIcon.textContent = window.weatherIcon(weatherType); weatherText.textContent = weatherCodeMap[w.weather_code] || '天氣資訊'; feels.textContent = '體感 ' + Math.round(w.apparent_temperature) + '°C'; humidity.textContent = w.relative_humidity_2m + '%'; wind.textContent = w.wind_speed_10m; rain.textContent = w.precipitation + ' mm'; renderScene();
      } catch { temp.textContent = '27°'; weatherText.textContent = '多雲時陰'; feels.textContent = '體感 29°C'; humidity.textContent = '78%'; wind.textContent = '9'; rain.textContent = '0 mm'; }
    }
    function goHome() {
      stopAllAudio();
      resultSection.classList.add('hidden');
      homePage.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'auto' });
    }
    renderChoices(); renderScene(); fetchWeather(); recommendBtn.onclick = renderRecommendations; backBtn.onclick = goHome;
  </script>
