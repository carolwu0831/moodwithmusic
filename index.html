<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Music Moodboard</title>

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: #eee8dc;
      color: #232323;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Noto Sans TC",
        "PingFang TC",
        "Microsoft JhengHei",
        sans-serif;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f6f1e8;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(70,55,35,.16);
    }

    section {
      padding: 28px 20px 40px;
    }

    .page {
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .hamburger {
      display: grid;
      gap: 6px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #232323;
    }

    .location {
      font-size: 13px;
      letter-spacing: .18em;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .hero {
      position: relative;
      min-height: 420px;
    }

    .hero-img {
      position: absolute;
      right: -118px;
      top: 0;
      width: 390px;
      height: 330px;
      border-bottom-left-radius: 80px;
      object-fit: cover;
      filter: saturate(.82) sepia(.16);
    }

    .fade-left {
      position: absolute;
      left: 122px;
      top: 0;
      width: 110px;
      height: 330px;
      background: linear-gradient(
        90deg,
        #f6f1e8,
        rgba(246,241,232,.75),
        transparent
      );
    }

    .fade-bottom {
      position: absolute;
      right: -118px;
      top: 305px;
      width: 390px;
      height: 80px;
      background: linear-gradient(
        180deg,
        transparent,
        #f6f1e8
      );
    }

    .weather {
      position: relative;
      z-index: 2;
      padding-top: 48px;
    }

    .temp-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .temp {
      font-size: 5.7rem;
      line-height: .85;
      font-weight: 200;
      letter-spacing: -.1em;
    }

    .weather-icon {
      font-size: 52px;
      line-height: 1;
    }

    .weather-title {
      font-size: 20px;
      letter-spacing: .25em;
      font-weight: 500;
      margin: 0;
    }

    .feels {
      margin: 16px 0 0;
      font-size: 15px;
      letter-spacing: .12em;
      color: #57534c;
    }

    .time-chip {
      display: inline-flex;
      margin-top: 12px;
      border: 1px solid rgba(35,35,35,.12);
      border-radius: 999px;
      padding: 5px 11px;
      background: rgba(250,247,240,.55);
      color: #6b6258;
      font-size: 12px;
      letter-spacing: .12em;
    }

    .stats {
      margin-top: 40px;
      width: 176px;
      display: grid;
      gap: 15px;
      color: #4f4a43;
      font-size: 15px;
      letter-spacing: .06em;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title {
      margin: 0 0 20px;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: .12em;
    }

    .mood-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .genre-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .choice {
      min-height: 88px;
      border: 1px solid #ded6ca;
      background: #faf7f0;
      border-radius: 13px;
      box-shadow: 0 4px 12px rgba(52,43,31,.08);
      padding: 8px 4px;
      color: #262626;
      transition: .2s;
      cursor: pointer;
      font: inherit;
    }

    .choice.active {
      border-color: #232323;
      background: #eee5d8;
      transform: translateY(-1px);
    }

    .recommend-btn {
      display: block;
      width: 68%;
      margin: 34px auto 0;
      border: none;
      border-radius: 9px;
      background: #1f1f1f;
      color: white;
      padding: 18px 10px;
      font-size: 16px;
      letter-spacing: .2em;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <main class="phone">

    <!-- 第一頁 -->
    <div id="homePage" class="page">

      <section>

        <div class="topbar">
          <div class="hamburger">
            <span></span>
            <span></span>
          </div>

          <div class="location">
            ⌖ 台北市 文山區
          </div>
        </div>

        <div class="hero">

          <img
            id="heroImage"
            class="hero-img"
          />

          <div class="fade-left"></div>
          <div class="fade-bottom"></div>

          <div class="weather">

            <div class="temp-row">

              <div class="temp" id="temp">
                --°
              </div>

              <div
                class="weather-icon"
                id="weatherIcon"
              >
                ☁
              </div>

            </div>

            <h1
              class="weather-title"
              id="weatherText"
            >
              讀取中
            </h1>

            <p class="feels" id="feels">
              體感 --°C
            </p>

            <div
              class="time-chip"
              id="timeChip"
            >
              午後氛圍
            </div>

            <div class="stats">

              <div class="stat">
                <span>♧ 濕度</span>
                <span id="humidity">--%</span>
              </div>

              <div class="stat">
                <span>≋ 風速</span>
                <span id="wind">--</span>
              </div>

              <div class="stat">
                <span>☂ 降雨量</span>
                <span id="rain">-- mm</span>
              </div>

            </div>

          </div>

        </div>

      </section>

      <section>

        <h2 class="section-title">
          今天，你的心情是？
        </h2>

        <div
          class="mood-grid"
          id="moodGrid"
        ></div>

      </section>

      <section>

        <h2 class="section-title">
          想聽的音樂類型是？
        </h2>

        <div
          class="genre-grid"
          id="genreGrid"
        ></div>

        <button
          class="recommend-btn"
          id="recommendBtn"
        >
          為我推薦 →
        </button>

      </section>

    </div>

  </main>

  <script>

    const moods = [
      "平靜",
      "放鬆",
      "開心",
      "難過",
      "疲憊",
      "無感",
      "暴躁",
      "焦慮"
    ];

    const genres = [
      "All",
      "Indie / 文青",
      "Lo-fi / Chill",
      "華語流行",
      "英文流行",
      "R&B 靈魂",
      "嘻哈",
      "搖滾",
      "Jazz",
      "夜晚感",
      "Emo",
      "Acoustic / 民謠"
    ];

    let selectedMood = "平靜";
    let selectedGenre = "All";

    function renderChoices() {

      moodGrid.innerHTML =
        moods.map(m => `
          <button
            class="choice ${m === selectedMood ? 'active' : ''}"
            data-mood="${m}"
          >
            ${m}
          </button>
        `).join("");

      genreGrid.innerHTML =
        genres.map(g => `
          <button
            class="choice ${g === selectedGenre ? 'active' : ''}"
            data-genre="${g}"
          >
            ${g}
          </button>
        `).join("");

      document
        .querySelectorAll("[data-mood]")
        .forEach(btn => {

          btn.onclick = () => {

            selectedMood = btn.dataset.mood;

            renderChoices();

          };

        });

      document
        .querySelectorAll("[data-genre]")
        .forEach(btn => {

          btn.onclick = () => {

            selectedGenre = btn.dataset.genre;

            renderChoices();

          };

        });

    }

    renderChoices();

  </script>

</body>
</html>
