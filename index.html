    .weather { position: relative; z-index: 2; padding-top: 48px; }
    .temp-row { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }

    .section-title { margin: 0 0 20px; font-size: 22px; font-weight: 500; letter-spacing: .12em; }

    .genre-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .choice { min-height: 88px; border: 1px solid #ded6ca; background: #faf7f0; border-radius: 13px; box-shadow: 0 4px 12px rgba(52,43,31,.08); padding: 8px 4px; color: #262626; transition: .2s; cursor: pointer; font: inherit; }
    .choice.genre { min-height: 82px; }
    .choice.active { border-color: #232323; background: #eee5d8; transform: translateY(-1px); }
    .doodle { height: 34px; width: 34px; margin: 0 auto 6px; color: #262626; display: flex; align-items: center; justify-content: center; }
    .doodle svg { width: 34px; height: 34px; }
    .genre-icon { font-size: 24px; margin-bottom: 9px; }
    .choice-label { font-size: 13px; font-weight: 500; letter-spacing: .05em; }
    .mood-label { font-size: 12px; letter-spacing: .08em; line-height: 1.2; }
    .recommend-btn { display: block; width: 68%; margin: 34px auto 0; border: none; border-radius: 9px; background: #1f1f1f; color: white; padding: 18px 10px; font-size: 16px; letter-spacing: .2em; cursor: pointer; }
    .result-section { position: relative; min-height: 100vh; padding-bottom: 48px; }
    .result-bg { position: absolute; left: 0; right: 0; bottom: 0; height: 380px; overflow: hidden; }

    .result-bg::after { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 210px; background: linear-gradient(#f6f1e8, rgba(246,241,232,.8), transparent); }

    .art { width: 56px; height: 56px; border-radius: 9px; object-fit: cover; background: #ddd4c8; }

const recommendationHistory=new Map();const globalRecentSongs=[];
let selectedMood="平靜",selectedGenre="All",weatherType="cloudy",timeOfDay="afternoon",imageSeed=417;
function comboHash(text){let h=0;for(let i=0;i<text.length;i++)h=(h*31+text.charCodeAt(i))%9973;return h;}
function classifyWeather(code){return[51,53,55,61,63,65,80,81,82,95].includes(code)?"rainy":[2,3,45,48].includes(code)?"cloudy":"sunny";}
function weatherIcon(type){return type==="rainy"?"☔":type==="sunny"?"☀":"☁";}
function getTimeOfDay(date=new Date()){const h=date.getHours();if(h>=5&&h<8)return"dawn";if(h>=8&&h<12)return"morning";if(h>=12&&h<17)return"afternoon";if(h>=17&&h<19)return"sunset";return"night";}
function timeLabel(type){return({dawn:"清晨",morning:"上午",afternoon:"午後",sunset:"傍晚",night:"夜晚"})[type]||"午後";}
function musicSearchUrl(song){return`https://music.apple.com/search?term=${encodeURIComponent(song.title+" "+song.artist)}`;}
function youtubeSearchUrl(song){return`https://www.youtube.com/results?search_query=${encodeURIComponent(song.title+" "+song.artist+" official audio")}`;}
function classifyGenresFromDescription(description,song){const text=`${description||""} ${song.title.toLowerCase()} ${song.artist.toLowerCase()}`;const tags=new Set();const rules=[{tag:"Jazz",words:["jazz","swing","jazz standard","vocal jazz"]},{tag:"Hip Hop",words:["hip hop","rap","jazz rap","chillhop"]},{tag:"Lo-fi",words:["lo-fi","lofi","chillhop","bedroom pop","chill hip hop"]},{tag:"R&B",words:["r&b","soul","neo soul","alternative r&b","funk"]},{tag:"Rock",words:["rock","post-punk","alternative rock","soft rock","indie rock","post-rock"]},{tag:"Indie",words:["indie","singer-songwriter","bedroom pop","dream pop","shoegaze","thai indie","ambient pop","slowcore"]},{tag:"Mandopop",words:["mandopop","chinese pop","taiwan","華語"]},{tag:"Pop",words:["pop","electropop","synth pop","dance pop","traditional pop"]},{tag:"Acoustic",words:["acoustic","folk","indie folk","folk rock","ballad","singer-songwriter"]},{tag:"Night",words:["dream pop","shoegaze","alternative r&b","lo-fi","bedroom pop","atmospheric","chill","ambient pop","slowcore","night pop"]},{tag:"Emo",words:["post-punk","alternative rock","indie rock","emotional","shoegaze","ballad"]}];rules.forEach(r=>{if(r.words.some(w=>text.includes(w)))tags.add(r.tag);});if(tags.size===0)song.genres.forEach(g=>tags.add(g));return[...tags];}
function getSongGenres(song){return classifyGenresFromDescription(onlineGenreDescriptions[`${song.title}|${song.artist}`],song);}
function generatedAlbumCover(song){const styles={"Apocalypse":{bg:"#252525",fg:"#e6ddd0",accent:"#9b8f80",type:"blur"},"Out of Nowhere":{bg:"#c9b8d6",fg:"#fff3e5",accent:"#6f5d7a",type:"dream"},"The Night We Met":{bg:"#243040",fg:"#d9c8ae",accent:"#8fa0aa",type:"night"},"關於小熊":{bg:"#e9d4a8",fg:"#5d4632",accent:"#2c594c",type:"doodle"},"Fly Me to the Moon":{bg:"#1c2430",fg:"#efe2c8",accent:"#c4a35a",type:"jazz"},"Nujabes - Feather":{bg:"#d9c79f",fg:"#4d5c63",accent:"#f4efe4",type:"lofi"}};const s=styles[song.title]||{bg:"#e5d7c4",fg:"#43392f",accent:"#8d765f",type:"minimal"};const seed=comboHash(song.title+song.artist);const title=song.title.replace(/&/g,"&amp;").replace(/</g,"&lt;").slice(0,18);const artist=song.artist.replace(/&/g,"&amp;").replace(/</g,"&lt;").slice(0,18);const motifs={blur:`<rect width='120' height='120' fill='${s.accent}' opacity='.2'/><circle cx='44' cy='45' r='34' fill='${s.fg}' opacity='.18'/><circle cx='82' cy='72' r='42' fill='${s.accent}' opacity='.22'/>`,dream:`<path d='M20 78 C38 30 82 30 100 78 C74 62 46 62 20 78 Z' fill='${s.fg}' opacity='.45'/><circle cx='76' cy='38' r='10' fill='${s.accent}'/>`,night:`<circle cx='70' cy='42' r='24' fill='${s.accent}' opacity='.35'/><path d='M18 86 C42 62 70 78 102 52' stroke='${s.fg}' stroke-width='5' fill='none' opacity='.55'/>`,doodle:`<circle cx='60' cy='52' r='22' fill='none' stroke='${s.fg}' stroke-width='4'/><circle cx='45' cy='35' r='9' fill='${s.fg}'/><circle cx='75' cy='35' r='9' fill='${s.fg}'/>`,jazz:`<circle cx='60' cy='55' r='38' fill='${s.accent}' opacity='.36'/><path d='M46 88 C64 78 68 55 66 30' stroke='${s.fg}' stroke-width='7' fill='none'/><circle cx='66' cy='30' r='8' fill='${s.fg}'/>`,lofi:`<path d='M18 74 C48 18 72 18 102 74' fill='none' stroke='${s.fg}' stroke-width='4'/><path d='M24 80 C44 68 76 68 96 80' stroke='${s.accent}' stroke-width='8' fill='none'/>`,minimal:`<rect x='26' y='25' width='68' height='68' rx='4' fill='none' stroke='${s.fg}' stroke-width='4'/><circle cx='60' cy='59' r='18' fill='${s.accent}' opacity='.32'/>`};const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><defs><filter id='grain'><feTurbulence baseFrequency='.85' numOctaves='3' seed='${seed}'/><feComponentTransfer><feFuncA type='table' tableValues='0 .14'/></feComponentTransfer></filter><linearGradient id='paper' x1='0' y1='0' x2='1' y2='1'><stop stop-color='${s.bg}'/><stop offset='.7' stop-color='#f6efe4'/><stop offset='1' stop-color='${s.accent}' stop-opacity='.7'/></linearGradient></defs><rect width='120' height='120' rx='14' fill='url(#paper)'/>${motifs[s.type]||motifs.minimal}<rect x='8' y='8' width='104' height='104' rx='10' fill='none' stroke='${s.fg}' stroke-opacity='.18'/><text x='60' y='101' text-anchor='middle' font-family='system-ui' font-size='9' font-weight='600' fill='${s.fg}' opacity='.78'>${title}</text><text x='60' y='112' text-anchor='middle' font-family='system-ui' font-size='6.5' fill='${s.fg}' opacity='.5'>${artist}</text><rect width='120' height='120' filter='url(#grain)'/></svg>`;return`data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;}
function generatedSceneUrl(type,mood,genre,seed){const wp={sunny:{tree:"#4f5636",lake:"#8d7a55",sand:"#ead9bd",stamp:"#d86f2e"},cloudy:{tree:"#3f4938",lake:"#786f5c",sand:"#e2d5bf",stamp:"#b97742"},rainy:{tree:"#334038",lake:"#5f625b",sand:"#d2c7b9",stamp:"#a7644b"}}[type];const tp={dawn:{sky:"#f2cfc2",glow:"#ff9f80",overlay:"#f9eadc",opacity:".62",sunX:"150",sunY:"150",label:"DAWN"},morning:{sky:"#fff0c9",glow:"#ffd36a",overlay:"#fff8e8",opacity:".55",sunX:"240",sunY:"130",label:"MORNING"},afternoon:{sky:"#f6f1e8",glow:"#e9c875",overlay:"#f7ead2",opacity:".34",sunX:"300",sunY:"210",label:"AFTERNOON"},sunset:{sky:"#e6a878",glow:"#d85d3f",overlay:"#f0bd87",opacity:".72",sunX:"155",sunY:"385",label:"SUNSET"},night:{sky:"#151a24",glow:"#5d6b98",overlay:"#303543",opacity:".42",sunX:"720",sunY:"160",label:"NIGHT"}}[timeOfDay];const rain=type==="rainy"?Array.from({length:34}).map((_,i)=>`<path d='M${(i*37+seed*11)%900} ${80+((i*59+seed)%760)} L${(i*37+seed*11)%900-22} ${80+((i*59+seed)%760)+54}' stroke='#f4efe6' stroke-width='2' opacity='.23'/>`).join(""):"";const clouds=type!=="sunny"?`<g opacity='${type==="rainy"?".38":".28"}'><ellipse cx='180' cy='180' rx='120' ry='42' fill='#fff8ed'/><ellipse cx='280' cy='160' rx='150' ry='54' fill='#fff8ed'/><ellipse cx='650' cy='235' rx='180' ry='50' fill='#fff8ed'/></g>`:"";const stars=timeOfDay==="night"?Array.from({length:26}).map((_,i)=>`<circle cx='${(i*73+seed*5)%860+20}' cy='${(i*41+seed*9)%360+40}' r='${1+(i%2)}' fill='#f6ead4' opacity='.65'/>`).join(""):"";const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 1400'><defs><filter id='g'><feTurbulence baseFrequency='.9' numOctaves='4' seed='${seed}'/><feComponentTransfer><feFuncA type='table' tableValues='0 .16'/></feComponentTransfer></filter><linearGradient id='sky' x1='0' y1='0' x2='0' y2='1'><stop stop-color='${tp.sky}'/><stop offset='.62' stop-color='${tp.overlay}'/><stop offset='1' stop-color='${wp.sand}'/></linearGradient><radialGradient id='sun' cx='${tp.sunX}' cy='${tp.sunY}' r='520' gradientUnits='userSpaceOnUse'><stop stop-color='${tp.glow}' stop-opacity='${tp.opacity}'/><stop offset='1' stop-color='${tp.glow}' stop-opacity='0'/></radialGradient></defs><rect width='900' height='1400' fill='url(#sky)'/><rect width='900' height='1400' fill='url(#sun)'/>${stars}${clouds}<path d='M0 430 C120 330 200 430 310 340 C430 240 520 400 640 310 C760 230 820 360 900 300 L900 680 L0 680 Z' fill='${wp.tree}' opacity='${timeOfDay==="night"?".78":"1"}'/><path d='M0 510 C100 430 170 500 250 420 C350 315 420 485 520 390 C650 280 700 470 820 360 C860 325 880 330 900 315 L900 690 L0 690 Z' fill='${wp.tree}' opacity='.58'/><rect y='650' width='900' height='360' fill='${wp.lake}' opacity='${timeOfDay==="night"?".86":"1"}'/>${rain}<path d='M0 990 C160 930 320 980 450 945 C610 905 735 960 900 905 L900 1400 L0 1400 Z' fill='${wp.sand}'/><g transform='translate(500 905)'><ellipse cx='0' cy='100' rx='185' ry='28' fill='#8a7659' opacity='.2'/><g transform='translate(-35 0)'><circle r='28' fill='${timeOfDay==="night"?"#1b1d22":"#2b2825"}'/><path d='M-30 33 C-50 80 -35 127 -8 150 C20 124 30 80 16 34 Z' fill='#8c5f49'/></g><g transform='translate(55 -16)'><circle r='31' fill='#4b3728'/><path d='M-24 38 C-42 91 -18 139 23 154 C57 118 64 71 31 34 Z' fill='#2d3551'/></g></g><text x='86' y='795' transform='rotate(90 86 795)' font-family='monospace' font-size='34' fill='${wp.stamp}' opacity='.72'>${tp.label}</text><text x='64' y='1320' font-family='system-ui' font-size='28' fill='#7d6e5e' opacity='.35'>${mood} · ${genre} · ${timeLabel(timeOfDay)}</text><rect width='900' height='1400' filter='url(#g)' opacity='.42'/></svg>`;return`data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;}
function renderScene(){timeOfDay=getTimeOfDay();const src=generatedSceneUrl(weatherType,selectedMood,selectedGenre,imageSeed+comboHash(`${weatherType}-${timeOfDay}`));heroImage.src=src;resultImage.src=src;timeChip.textContent=`${timeLabel(timeOfDay)}氛圍`;}
function renderChoices(){moodGrid.innerHTML=moods.map(m=>`<button class='choice ${m===selectedMood?"active":""}' data-mood='${m}'><div class='doodle'>${moodSvg(m)}</div><div class='mood-label'>${m}</div></button>`).join("");genreGrid.innerHTML=genres.map(g=>`<button class='choice genre ${g===selectedGenre?"active":""}' data-genre='${g}'><div class='genre-icon'>${genreEmoji(g)}</div><div class='choice-label'>${g}</div></button>`).join("");document.querySelectorAll('[data-mood]').forEach(b=>b.onclick=()=>{selectedMood=b.dataset.mood;renderChoices();renderScene();});document.querySelectorAll('[data-genre]').forEach(b=>b.onclick=()=>{selectedGenre=b.dataset.genre;renderChoices();renderScene();});}
function genreEmoji(g){return({"All":"♫","Indie / 文青":"♬","Lo-fi / Chill":"☊","華語流行":"▣","英文流行":"☆","R&B 靈魂":"♡","嘻哈":"♙","搖滾":"ϟ","Jazz":"♩","夜晚感":"☾","Emo":"☔","Acoustic / 民謠":"♭"})[g]||"♫";}
function moodSvg(m){const map={平靜:"M24 25 L24 50 M14 36 L34 36 M24 50 L16 68 M24 50 L32 68",放鬆:"M25 28 C18 38 16 47 24 54 M24 40 C14 42 12 50 20 54 M28 38 C38 39 42 45 39 52",開心:"M24 26 L24 51 M13 34 L24 24 L35 34 M24 51 L15 68 M24 51 L33 68",難過:"M25 28 C17 39 17 54 28 60 M22 42 C15 47 14 55 19 61",疲憊:"M24 27 C21 39 22 50 26 60 M20 43 L14 58 M28 43 L34 58",無感:"M24 28 L24 53 M16 40 L32 40 M24 53 L18 68 M24 53 L31 68",暴躁:"M24 27 L24 51 M13 40 L23 32 M25 32 L37 39 M24 51 L14 68 M24 51 L35 68",焦慮:"M24 27 C18 36 17 48 24 56 M18 39 L11 52 M29 38 L37 48"};return`<svg viewBox='0 0 48 78' preserveAspectRatio='xMidYMid meet' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><circle cx='24' cy='24' r='7'/><path d='${map[m]}'/></svg>`;}
function getRecommendations(){const mapped=genreAliases[selectedGenre]||[selectedGenre];const languageFilter=selectedGenre==="英文流行"?"EN":selectedGenre==="華語流行"?"中文":null;const comboKey=`${selectedGenre}-${selectedMood}-${weatherType}`;const previous=recommendationHistory.get(comboKey)||[];const hash=comboHash(`${comboKey}-${Date.now()%100000}`);const ranked=songLibrary.filter(s=>!languageFilter||s.lang===languageFilter).map((s,i)=>{const inferredGenres=getSongGenres(s);let score=0;if(selectedGenre==="All")score+=1;if(mapped.some(g=>inferredGenres.includes(g)))score+=14;if(s.moods.includes(selectedMood))score+=8;if(s.weather.includes(weatherType))score+=4;if(previous.includes(s.title))score-=18;score+=((hash+i*91)%1000)/100;return{...s,inferredGenres,score};}).filter(s=>selectedGenre==="All"||mapped.some(g=>s.inferredGenres.includes(g))).sort((a,b)=>b.score-a.score);const picked=[],artists=new Set();for(const s of ranked){if(picked.length>=3)break;if(artists.has(s.artist))continue;picked.push(s);artists.add(s.artist);}recommendationHistory.set(comboKey,picked.map(s=>s.title));return picked;}
async function fetchMeta(song){const queries=[`${song.title} ${song.artist}`,song.title,song.artist];for(const country of ['TW','US'])for(const query of queries)try{const res=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=8&country=${country}`);const data=await res.json();const results=data.results||[];if(!results.length)continue;const best=results.find(x=>x.previewUrl)||results[0];return{preview:best.previewUrl,link:best.trackViewUrl};}catch{}return{};}
function stopAllAudio(){document.querySelectorAll('audio').forEach(a=>{a.pause();a.currentTime=0;});}
function bindExclusiveAudioPlayback(){document.querySelectorAll('audio').forEach(a=>a.addEventListener('play',()=>document.querySelectorAll('audio').forEach(o=>{if(o!==a){o.pause();o.currentTime=0;}})));}
async function renderRecommendations(){stopAllAudio();imageSeed+=comboHash(`${selectedGenre}-${selectedMood}-${weatherType}`)%53+7;renderScene();const songs=getRecommendations();homePage.classList.add('hidden');resultSection.classList.remove('hidden');window.scrollTo({top:0,behavior:'auto'});resultArea.className='songs';resultArea.innerHTML=`<p class='caption'>${moodCaptions[selectedMood]}</p><div class='hint'>正在整理推薦歌曲...</div>`;resultArea.innerHTML=`<p class='caption'>${moodCaptions[selectedMood]}</p>`;for(const [i,song] of songs.entries()){const meta=await fetchMeta(song);const div=document.createElement('article');div.className='song-card';div.style.animationDelay=`${i*.02}s`;const img=document.createElement('img');img.className='art';img.alt=`${song.title} generated album-style cover`;img.src=generatedAlbumCover(song);div.appendChild(img);const info=document.createElement('div');const title=document.createElement('p');title.className='song-title';title.textContent=song.title;const artist=document.createElement('p');artist.className='song-artist';artist.textContent=song.artist;const metaLine=document.createElement('div');metaLine.className='song-meta';metaLine.innerHTML=`<span>${song.lang}</span><span>·</span><span>${song.duration}</span><span>·</span><span>${getSongGenres(song).slice(0,2).join(' / ')}</span>`;info.append(title,artist,metaLine);const listenRow=document.createElement('div');listenRow.className='listen-row';if(meta.preview){const audio=document.createElement('audio');audio.controls=true;audio.preload='none';audio.playsInline=true;audio.crossOrigin='anonymous';audio.src=meta.preview;audio.addEventListener('error',()=>{audio.remove();const note=document.createElement('div');note.className='audio-note';note.textContent='此歌曲試聽檔暫時無法播放，請用下方連結開啟。';info.appendChild(note);});info.appendChild(audio);}else{const note=document.createElement('div');note.className='audio-note';note.textContent='這首歌沒有可嵌入的試聽檔。';info.appendChild(note);}const apple=document.createElement('a');apple.className='music-link';apple.href=meta.link||musicSearchUrl(song);apple.target='_blank';apple.rel='noreferrer';apple.textContent='Apple Music';listenRow.appendChild(apple);const youtube=document.createElement('a');youtube.className='music-link';youtube.href=youtubeSearchUrl(song);youtube.target='_blank';youtube.rel='noreferrer';youtube.textContent='YouTube 試聽';listenRow.appendChild(youtube);info.appendChild(listenRow);div.appendChild(info);resultArea.appendChild(div);}bindExclusiveAudioPlayback();}
async function fetchWeather(){try{const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${WENSHAN.latitude}&longitude=${WENSHAN.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&timezone=Asia%2FTaipei`);const data=await res.json();const w=data.current;weatherType=classifyWeather(w.weather_code);timeOfDay=getTimeOfDay();temp.textContent=Math.round(w.temperature_2m)+'°';weatherIcon.textContent=window.weatherIcon(weatherType);weatherText.textContent=weatherCodeMap[w.weather_code]||'天氣資訊';feels.textContent='體感 '+Math.round(w.apparent_temperature)+'°C';humidity.textContent=w.relative_humidity_2m+'%';wind.textContent=w.wind_speed_10m;rain.textContent=w.precipitation+' mm';renderScene();}catch{temp.textContent='27°';weatherText.textContent='多雲時陰';feels.textContent='體感 29°C';humidity.textContent='78%';wind.textContent='9';rain.textContent='0 mm';}}
function goHome(){stopAllAudio();resultSection.classList.add('hidden');homePage.classList.remove('hidden');window.scrollTo({top:0,behavior:'auto'});}
renderChoices();renderScene();fetchWeather();recommendBtn.onclick=renderRecommendations;backBtn.onclick=goHome;setInterval(renderScene,60000);
